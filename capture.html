<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mizhi Capture</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: #101417;
        color: #f5f7f9;
        display: flex;
        flex-direction: column;
      }
      .viewport {
        position: relative;
        flex: 1;
        min-height: 0;
      }
      #video {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain;
        background: #000;
      }
      #overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
      }
      #status {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        color: #ccc;
        text-align: center;
        z-index: 10;
      }
      .controls {
        display: flex;
        gap: 8px;
        padding: 8px 12px;
        background: #1a1d22;
        justify-content: center;
        flex-wrap: wrap;
        safe-area-inset-bottom: env(safe-area-inset-bottom);
      }
      .controls button {
        min-width: 48px;
        min-height: 48px;
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: #333;
        touch-action: manipulation;
      }
      #session-btn { background: #2563eb; }
      #confirm-btn { background: #0d9488; display: none; }
      #capture-btn { background: #444; }
      #save-btn { background: #555; display: none; }
    </style>
  </head>
  <body>
    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="status">Initializing...</div>
    </div>
    <div class="controls">
      <button id="session-btn">Start Session</button>
      <button id="confirm-btn">Confirm View</button>
      <button id="capture-btn">Capture</button>
      <button id="save-btn">Save</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
